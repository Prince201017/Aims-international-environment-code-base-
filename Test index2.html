<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Location</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    body {
      background: #E8D9CD;
      color: #523D35;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 1100px;
      margin: auto;
      padding: 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-size: clamp(1.5rem, 3vw, 2.2rem);
    }

    .map-box {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .map-container {
      width: 100%;
      height: 50vh;
      min-height: 260px;
      border-radius: 1rem;
      overflow: hidden;
    }

    .map-container iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .info {
      background: #fff;
      padding: 1rem;
      border-radius: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .info p {
      font-size: clamp(0.9rem, 2vw, 1rem);
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      text-align: center;
      padding: 0.7rem 1rem;
      border-radius: 0.6rem;
      background: #523D35;
      color: #fff;
      text-decoration: none;
      margin-top: 0.5rem;
      transition: 0.3s;
    }

    .btn:hover {
      background: #3b2b24;
    }

    footer {
      text-align: center;
      padding: 0.8rem;
      font-size: 0.85rem;
      background: #BBA58F;
    }

    /* Mobile Optimization */
    @media (max-width: 480px) {
      .container {
        padding: 0.8rem;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      <h1>📍 Our Location</h1>
      <p>Find us easily on the map</p>
    </div>

    <div class="map-box">
      <div class="map-container">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d7074.891855416712!2d81.6087477!3d27.5486678!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3999af6dbadf40cd%3A0x5f259d463806601a!2sAIMS%20INTERNATIONAL%20SCHOOL%20BAHRAICH!5e0!3m2!1sen!2sin!4v1775653834569!5m2!1sen!2sin" width="600" height="450"
          loading="lazy">
        </iframe>

      </div>


      <div class="info">
        <p><strong>Address:</strong> Aims international School</p>
        <p>Visit our campus or use directions below to reach us easily.</p>

        <a 
          href="https://maps.app.goo.gl/sJcbXLULL6vmNiQd6"
          target="_blank"
          class="btn">
          Get Directions
        </a>
      </div>
    </div>
  </div>

  <footer>
    © 2026 Your Website
  </footer>

</body>
</html>
